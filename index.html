<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rhythm Challenge</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2328a9f4'/%3E%3Ccircle cx='32' cy='32' r='17' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="practice-card" aria-label="Rhythm Challenge">
        <header class="topbar">
          <div class="brand-lockup">
            <div class="brand-mark" aria-hidden="true"></div>
            <div>
              <h1>Rhythm Challenge</h1>
              <p id="levelTitle">Level 1 / 30</p>
            </div>
          </div>
          <div class="level-summary" aria-live="polite">
            <strong id="levelMeta">4 combos · 78 BPM</strong>
          </div>
        </header>

        <div class="beat-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <section class="stage-panel">
          <div class="chain-area">
            <div class="chain-label">
              <span>Target</span>
              <strong id="targetBeatCount">4 beats</strong>
            </div>
            <div class="chain-row target-chain" id="targetChain"></div>

            <div class="chain-label player-label">
              <span>Your Chain</span>
              <strong id="playerBeatCount">0 beats</strong>
            </div>
            <div class="chain-row player-chain" id="playerChain"></div>
          </div>

          <div class="drill-footer">
            <strong id="drillLabel">Drill 1</strong>
            <span id="statusText" aria-live="polite">Ready</span>
          </div>

          <div class="stage-toolbar">
            <div class="readouts">
              <div>
                <span>Combos</span>
                <strong id="comboReadout">0 / 4</strong>
              </div>
              <div>
                <span>Beats</span>
                <strong id="beatReadout">4</strong>
              </div>
              <div>
                <span>Score</span>
                <strong id="accuracyReadout">0%</strong>
              </div>
            </div>
            <div class="transport">
              <button class="icon-button" id="playTargetButton" type="button" title="Play target" aria-label="Play target">
                <span aria-hidden="true">▶</span>
                <span>Target</span>
              </button>
              <button class="icon-button" id="playPlayerButton" type="button" title="Play your chain" aria-label="Play your chain">
                <span aria-hidden="true">▶</span>
                <span>Mine</span>
              </button>
              <button class="icon-button check" id="checkButton" type="button" title="Check" aria-label="Check">
                <span aria-hidden="true">✓</span>
                <span>Check</span>
              </button>
              <button class="icon-only" id="undoButton" type="button" title="Undo" aria-label="Undo">↶</button>
              <button class="icon-only" id="clearButton" type="button" title="Clear" aria-label="Clear">×</button>
              <button class="icon-only next" id="nextButton" type="button" title="Next level" aria-label="Next level">→</button>
            </div>
          </div>
        </section>

        <aside class="library-panel">
          <div class="library-head">
            <div>
              <span class="panel-label">Rhythm Cards</span>
              <strong id="libraryCount">4</strong>
            </div>
            <button class="ghost-button" id="previewDeckButton" type="button">Audition</button>
          </div>
          <div class="pattern-library" id="patternLibrary"></div>
        </aside>

        <aside class="level-panel">
          <div class="panel-label">30 Drills</div>
          <div class="level-grid" id="levelList"></div>
        </aside>
      </section>
    </main>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
